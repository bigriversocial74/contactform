name: Prepaid Demand Intelligence Validation

on:
  push:
    branches: [stage15-ui]
  pull_request:
    branches: [main]
    paths:
      - 'database/stage_15c_prepaid_demand_commitments.sql'
      - 'api/demand/_prepaid*.php'
      - 'api/account/demand-commitments.php'
      - 'api/merchant/prepaid-demand.php'
      - 'api/merchant/committed-demand.php'
      - 'commitments.php'
      - 'intelligence.php'
      - 'assets/js/demand-commitments.js'
      - 'assets/js/intelligence.js'
      - 'assets/css/demand-commitments.css'
      - 'assets/css/committed-demand.css'
      - 'scripts/validate_prepaid_demand_behavior.php'
      - 'tests/phpunit/ProductionPrepaidDemandIntelligenceFoundationTest.php'
      - 'tests/browser/prepaid-demand-intelligence-foundation.spec.js'
      - 'composer.json'
      - 'scripts/build_full_upgrade_sql.php'
      - '.github/workflows/prepaid-demand-intelligence-validation.yml'

permissions:
  contents: read
  statuses: write

concurrency:
  group: prepaid-demand-intelligence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: microgifter_test
          MYSQL_USER: microgifter_test
          MYSQL_PASSWORD: microgifter_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      MG_TEST_BASE_URL: http://127.0.0.1:8080
      MG_TEST_SKIP_AUTHENTICATED: '1'
      MG_RUN_PREPAID_DEMAND_BEHAVIOR: '1'
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_BASE_URL: http://127.0.0.1:8080
      MG_SESSION_NAME: mg_prepaid_demand_test_session
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: validation-payment-secret
      MG_PAYMENT_SANDBOX_SECRET: validation-sandbox-secret
      MG_CLAIM_CODE_PEPPER: validation-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: validation-media-secret
      MG_DISTRIBUTION_HASH_SECRET: validation-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: validation-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: validation-merchant-secret
      MG_REPORT_EMAIL_SECRET: validation-report-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Validate changed syntax
        run: |
          php -l api/demand/_prepaid.php
          php -l api/demand/_prepaid_read.php
          php -l api/demand/_prepaid_write.php
          php -l api/account/demand-commitments.php
          php -l api/merchant/prepaid-demand.php
          php -l commitments.php
          php -l intelligence.php
          php -l scripts/validate_prepaid_demand_behavior.php
          php -l tests/phpunit/ProductionPrepaidDemandIntelligenceFoundationTest.php
          node --check assets/js/demand-commitments.js
          node --check assets/js/intelligence.js
          node --check tests/browser/prepaid-demand-intelligence-foundation.spec.js
      - name: Configure MySQL schema prerequisites
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"
      - name: Apply complete ordered schema
        run: |
          mkdir -p build
          php scripts/build_full_upgrade_sql.php build/microgifter_full_upgrade.sql
          mysql -h 127.0.0.1 -umicrogifter_test -pmicrogifter_test microgifter_test < build/microgifter_full_upgrade.sql > build/schema.log 2>&1
          cat build/schema.log
      - name: Validate prepaid demand behavior
        shell: bash
        run: |
          set -o pipefail
          composer test-prepaid-demand-behavior 2>&1 | tee build/prepaid-demand-behavior.log
      - name: Validate prepaid demand authority contracts
        shell: bash
        run: |
          set -o pipefail
          vendor/bin/phpunit --configuration phpunit.xml.dist --filter ProductionPrepaidDemandIntelligenceFoundationTest 2>&1 | tee build/prepaid-demand-contracts.log
      - name: Validate frontend contracts
        run: composer test-frontend-contracts
      - name: Start PHP test server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/microgifter-prepaid-demand-server.log 2>&1 &
          echo $! > /tmp/microgifter-prepaid-demand-server.pid
          for attempt in {1..20}; do curl --fail --silent http://127.0.0.1:8080/api/health.php >/dev/null && exit 0; sleep 1; done
          cat /tmp/microgifter-prepaid-demand-server.log
          exit 1
      - name: Validate repository PHPUnit suite
        run: composer test
      - name: Validate focused browser behavior
        run: npx playwright test tests/browser/prepaid-demand-intelligence-foundation.spec.js
      - name: Validate browser regression suite
        run: npm run test:browser
      - name: Show PHP server log on failure
        if: failure()
        run: cat /tmp/microgifter-prepaid-demand-server.log || true
      - name: Stop PHP test server
        if: always()
        run: if [ -f /tmp/microgifter-prepaid-demand-server.pid ]; then kill "$(cat /tmp/microgifter-prepaid-demand-server.pid)" || true; fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prepaid-demand-intelligence-diagnostics
          path: |
            build/schema.log
            build/prepaid-demand-behavior.log
            build/prepaid-demand-contracts.log
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: warn
      - name: Publish branch validation status
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({ owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: success ? 'success' : 'failure', context: 'prepaid-demand-intelligence-branch-validation', target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`, description: success ? 'Prepaid demand intelligence validation passed.' : 'Prepaid demand intelligence validation failed.' });
