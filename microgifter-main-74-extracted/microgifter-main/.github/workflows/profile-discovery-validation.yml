name: Profile Discovery Search Validation

on:
  push:
    branches: [production-profile-discovery-search-foundation]
  pull_request:
    branches: [main]
    paths:
      - 'discover.php'
      - 'api/profiles/_discovery.php'
      - 'api/public/discover.php'
      - 'assets/js/profile-discovery.js'
      - 'assets/css/profile-discovery.css'
      - 'scripts/validate_profile_discovery_behavior.php'
      - 'tests/phpunit/ProductionProfileDiscoverySearchFoundationTest.php'
      - 'tests/browser/profile-discovery-search-foundation.spec.js'
      - 'docs/production/profile-discovery-search-foundation.md'
      - 'composer.json'
      - '.github/workflows/profile-discovery-validation.yml'

permissions:
  contents: read
  statuses: write

concurrency:
  group: profile-discovery-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: microgifter_test
          MYSQL_USER: microgifter_test
          MYSQL_PASSWORD: microgifter_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      MG_TEST_BASE_URL: http://127.0.0.1:8080
      MG_TEST_SKIP_AUTHENTICATED: '1'
      MG_RUN_PROFILE_DISCOVERY_BEHAVIOR: '1'
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_BASE_URL: http://127.0.0.1:8080
      MG_SESSION_NAME: mg_profile_discovery_test_session
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: validation-payment-secret
      MG_PAYMENT_SANDBOX_SECRET: validation-sandbox-secret
      MG_CLAIM_CODE_PEPPER: validation-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: validation-media-secret
      MG_DISTRIBUTION_HASH_SECRET: validation-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: validation-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: validation-merchant-secret
      MG_REPORT_EMAIL_SECRET: validation-report-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Validate changed syntax
        run: |
          php -l discover.php
          php -l api/profiles/_discovery.php
          php -l api/public/discover.php
          php -l scripts/validate_profile_discovery_behavior.php
          php -l tests/phpunit/ProductionProfileDiscoverySearchFoundationTest.php
          node --check assets/js/profile-discovery.js
          node --check tests/browser/profile-discovery-search-foundation.spec.js
      - name: Configure MySQL schema prerequisites
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"
      - name: Apply complete ordered schema
        run: |
          mkdir -p build
          php scripts/build_full_upgrade_sql.php build/microgifter_full_upgrade.sql
          set +e
          mysql -h 127.0.0.1 -umicrogifter_test -pmicrogifter_test microgifter_test < build/microgifter_full_upgrade.sql > build/schema.log 2>&1
          status=$?
          cat build/schema.log
          exit "$status"
      - name: Validate profile discovery behavior
        run: |
          set +e
          composer test-profile-discovery-behavior > build/profile-discovery-behavior.log 2>&1
          status=$?
          cat build/profile-discovery-behavior.log
          exit "$status"
      - name: Validate profile discovery authority contracts
        run: |
          set +e
          vendor/bin/phpunit --configuration phpunit.xml.dist --filter ProductionProfileDiscoverySearchFoundationTest > build/profile-discovery-contracts.log 2>&1
          status=$?
          cat build/profile-discovery-contracts.log
          exit "$status"
      - name: Validate frontend contracts
        run: composer test-frontend-contracts
      - name: Start PHP test server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/microgifter-profile-discovery-server.log 2>&1 &
          echo $! > /tmp/microgifter-profile-discovery-server.pid
          for attempt in {1..20}; do
            curl --fail --silent --show-error http://127.0.0.1:8080/api/health.php >/tmp/microgifter-profile-discovery-health.json && exit 0
            sleep 1
          done
          cat /tmp/microgifter-profile-discovery-server.log
          exit 1
      - name: Validate repository PHPUnit suite
        run: composer test
      - name: Validate focused browser behavior
        run: npx playwright test tests/browser/profile-discovery-search-foundation.spec.js
      - name: Validate browser regression suite
        run: npm run test:browser
      - name: Show PHP server log on failure
        if: failure()
        run: cat /tmp/microgifter-profile-discovery-server.log || true
      - name: Stop PHP test server
        if: always()
        run: if [ -f /tmp/microgifter-profile-discovery-server.pid ]; then kill "$(cat /tmp/microgifter-profile-discovery-server.pid)" || true; fi
      - name: Upload profile discovery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-discovery-diagnostics
          path: |
            build/schema.log
            build/profile-discovery-behavior.log
            build/profile-discovery-contracts.log
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: warn
      - name: Publish branch validation status
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'profile-discovery-branch-validation',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: success ? 'Profile discovery validation passed.' : 'Profile discovery validation failed.'
            });
