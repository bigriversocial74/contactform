name: Stage 12D Schema Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - 'database/stage_12d_tip_recovery.sql'
      - 'scripts/build_full_upgrade_sql.php'
      - '.github/workflows/stage12d-schema-diagnostics.yml'

permissions:
  contents: read

jobs:
  schema:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_stage12d
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo,pdo_mysql
          coverage: none
      - name: Configure MySQL
        run: |
          sudo systemctl start mysql.service
          run_mysql_root() {
            if mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if mysql -uroot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql "$@" 2>/tmp/mysql-root.err; then return 0; fi
            cat /tmp/mysql-root.err || true
            return 1
          }
          run_mysql_root <<'SQL'
          CREATE DATABASE IF NOT EXISTS microgifter_stage12d CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'microgifter_test'@'localhost' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'127.0.0.1' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'%' IDENTIFIED BY 'microgifter_test';
          GRANT ALL PRIVILEGES ON microgifter_stage12d.* TO 'microgifter_test'@'localhost';
          GRANT ALL PRIVILEGES ON microgifter_stage12d.* TO 'microgifter_test'@'127.0.0.1';
          GRANT ALL PRIVILEGES ON microgifter_stage12d.* TO 'microgifter_test'@'%';
          SET GLOBAL log_bin_trust_function_creators = 1;
          FLUSH PRIVILEGES;
          SQL
      - name: Build full upgrade SQL
        run: php scripts/build_full_upgrade_sql.php build/microgifter_full_upgrade.sql
      - name: Apply full upgrade SQL
        id: apply
        run: |
          set +e
          mysql -h 127.0.0.1 -umicrogifter_test -pmicrogifter_test microgifter_stage12d < build/microgifter_full_upgrade.sql > build/stage12d-schema.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload schema diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage12d-schema-diagnostics
          path: build/stage12d-schema.log
          retention-days: 1
          if-no-files-found: error
      - name: Fail on schema error
        run: test "${{ steps.apply.outputs.exit_code }}" = "0"
