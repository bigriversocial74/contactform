name: Browser Validation
on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.php'
      - 'assets/**'
      - 'includes/**'
      - 'api/**'
      - 'tests/browser/**'
      - 'package.json'
      - 'playwright.config.js'
      - '.github/workflows/browser-validation.yml'

permissions:
  contents: read

concurrency:
  group: browser-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: microgifter_test
          MYSQL_USER: microgifter_test
          MYSQL_PASSWORD: microgifter_test
          MYSQL_ROOT_PASSWORD: root_test_password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_test_password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      MG_TEST_BASE_URL: http://127.0.0.1:8080
      MG_TEST_SKIP_AUTHENTICATED: '1'
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_BASE_URL: http://127.0.0.1:8080
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_SESSION_NAME: mg_test_session
      MG_CLAIM_CODE_PEPPER: browser-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: browser-media-secret
      MG_DISTRIBUTION_HASH_SECRET: browser-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: browser-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: browser-merchant-secret
      MG_REPORT_EMAIL_SECRET: browser-report-secret
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: browser-payment-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Wait for MySQL
        run: |
          for attempt in {1..30}; do mysqladmin ping -h 127.0.0.1 -umicrogifter_test -pmicrogifter_test --silent && exit 0; sleep 1; done
          exit 1
      - name: Allow trusted trigger creation in CI MySQL
        run: mysql -h 127.0.0.1 -uroot -proot_test_password -e "SET GLOBAL log_bin_trust_function_creators = 1;"
      - run: composer migrate
      - name: Start PHP test server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/microgifter-browser-server.log 2>&1 &
          echo $! > /tmp/microgifter-browser-server.pid
          for attempt in {1..20}; do
            curl --fail --silent --show-error http://127.0.0.1:8080/api/health.php >/tmp/microgifter-browser-health.json && exit 0
            sleep 1
          done
          cat /tmp/microgifter-browser-server.log
          exit 1
      - run: npm run test:browser
      - name: Upload browser artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
      - name: Show PHP server log on failure
        if: failure()
        run: cat /tmp/microgifter-browser-server.log || true
      - name: Stop PHP test server
        if: always()
        run: if [ -f /tmp/microgifter-browser-server.pid ]; then kill "$(cat /tmp/microgifter-browser-server.pid)" || true; fi
