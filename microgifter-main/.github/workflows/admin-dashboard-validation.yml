name: Admin Dashboard Foundation Validation

on:
  push:
    branches: [production-admin-dashboard-foundation]
  pull_request:
    branches: [main]
    paths:
      - 'account.php'
      - 'account-admin.php'
      - 'includes/account/admin-dashboard.php'
      - 'includes/header.php'
      - 'api/admin/dashboard.php'
      - 'api/admin/_dashboard.php'
      - 'api/admin/_dashboard_queries.php'
      - 'api/admin/security-logs.php'
      - 'assets/js/admin-dashboard.js'
      - 'assets/css/admin-dashboard.css'
      - 'scripts/validate_admin_dashboard_behavior.php'
      - 'tests/phpunit/ProductionAdminDashboardFoundationTest.php'
      - 'tests/browser/admin-dashboard-foundation.spec.js'
      - 'docs/production/admin-dashboard-foundation.md'
      - 'composer.json'
      - '.github/workflows/admin-dashboard-validation.yml'

permissions:
  contents: read
  statuses: write

concurrency:
  group: admin-dashboard-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: microgifter_test
          MYSQL_USER: microgifter_test
          MYSQL_PASSWORD: microgifter_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      MG_TEST_BASE_URL: http://127.0.0.1:8080
      MG_TEST_SKIP_AUTHENTICATED: '1'
      MG_RUN_ADMIN_DASHBOARD_BEHAVIOR: '1'
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_BASE_URL: http://127.0.0.1:8080
      MG_SESSION_NAME: mg_admin_dashboard_test_session
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: validation-payment-secret
      MG_PAYMENT_SANDBOX_SECRET: validation-sandbox-secret
      MG_CLAIM_CODE_PEPPER: validation-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: validation-media-secret
      MG_DISTRIBUTION_HASH_SECRET: validation-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: validation-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: validation-merchant-secret
      MG_REPORT_EMAIL_SECRET: validation-report-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Validate changed syntax
        run: |
          php -l account.php
          php -l includes/account/admin-dashboard.php
          php -l includes/header.php
          php -l api/admin/dashboard.php
          php -l api/admin/_dashboard.php
          php -l api/admin/_dashboard_queries.php
          php -l api/admin/security-logs.php
          php -l scripts/validate_admin_dashboard_behavior.php
          php -l tests/phpunit/ProductionAdminDashboardFoundationTest.php
          node --check assets/js/admin-dashboard.js
          node --check tests/browser/admin-dashboard-foundation.spec.js
      - name: Configure MySQL schema prerequisites
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL log_bin_trust_function_creators = 1;"
      - name: Apply complete ordered schema
        run: |
          mkdir -p build
          php scripts/build_full_upgrade_sql.php build/microgifter_full_upgrade.sql
          set +e
          mysql -h 127.0.0.1 -umicrogifter_test -pmicrogifter_test microgifter_test < build/microgifter_full_upgrade.sql > build/schema.log 2>&1
          status=$?
          cat build/schema.log
          exit "$status"
      - name: Validate admin dashboard behavior
        run: |
          set +e
          composer test-admin-dashboard-behavior > build/admin-dashboard-behavior.log 2>&1
          status=$?
          cat build/admin-dashboard-behavior.log
          exit "$status"
      - name: Validate admin dashboard contracts
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --filter ProductionAdminDashboardFoundationTest
      - name: Validate frontend contracts
        run: |
          set +e
          composer test-frontend-contracts > build/frontend-contracts.log 2>&1
          status=$?
          cat build/frontend-contracts.log
          exit "$status"
      - name: Start PHP test server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/microgifter-admin-dashboard-server.log 2>&1 &
          echo $! > /tmp/microgifter-admin-dashboard-server.pid
          for attempt in {1..20}; do
            curl --fail --silent --show-error http://127.0.0.1:8080/api/health.php >/tmp/microgifter-admin-dashboard-health.json && exit 0
            sleep 1
          done
          cat /tmp/microgifter-admin-dashboard-server.log
          exit 1
      - name: Validate repository PHPUnit suite
        run: |
          set +e
          composer test > build/repository-phpunit.log 2>&1
          status=$?
          cat build/repository-phpunit.log
          exit "$status"
      - name: Validate browser contracts
        run: npm run test:browser
      - name: Show PHP server log on failure
        if: failure()
        run: cat /tmp/microgifter-admin-dashboard-server.log || true
      - name: Stop PHP test server
        if: always()
        run: if [ -f /tmp/microgifter-admin-dashboard-server.pid ]; then kill "$(cat /tmp/microgifter-admin-dashboard-server.pid)" || true; fi
      - name: Upload admin dashboard diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-diagnostics
          path: |
            build/schema.log
            build/admin-dashboard-behavior.log
            build/frontend-contracts.log
            build/repository-phpunit.log
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: warn
      - name: Publish branch validation status
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'admin-dashboard-branch-validation',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: success ? 'Admin dashboard validation passed.' : 'Admin dashboard validation failed.'
            });
