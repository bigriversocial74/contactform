name: Stage 12D Tip Recovery Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/tips/**'
      - 'api/payments/**'
      - 'api/finance/**'
      - 'database/stage_12d_tip_recovery.sql'
      - 'scripts/stage12d.php'
      - 'scripts/stage12d_smoke.php'
      - 'scripts/validate_tip_recovery_behavior.php'
      - 'tests/integration/TipRecoveryBehaviorFixture.php'
      - 'tests/phpunit/Stage12DTipRecoveryBehaviorTest.php'
      - 'composer.json'
      - '.github/workflows/stage12d-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: validation-payment-secret
      MG_PAYMENT_SANDBOX_SECRET: validation-sandbox-secret
      MG_CLAIM_CODE_PEPPER: validation-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: validation-media-secret
      MG_DISTRIBUTION_HASH_SECRET: validation-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: validation-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: validation-merchant-secret
      MG_REPORT_EMAIL_SECRET: validation-report-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: find api/tips scripts tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Configure MySQL
        run: |
          sudo systemctl start mysql.service
          run_mysql_root() {
            if mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if mysql -uroot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql "$@" 2>/tmp/mysql-root.err; then return 0; fi
            cat /tmp/mysql-root.err || true
            return 1
          }
          run_mysql_root -e "SELECT 1"
          run_mysql_root <<'SQL'
          CREATE DATABASE IF NOT EXISTS microgifter_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'microgifter_test'@'localhost' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'127.0.0.1' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'%' IDENTIFIED BY 'microgifter_test';
          GRANT ALL PRIVILEGES ON microgifter_test.* TO 'microgifter_test'@'localhost';
          GRANT ALL PRIVILEGES ON microgifter_test.* TO 'microgifter_test'@'127.0.0.1';
          GRANT ALL PRIVILEGES ON microgifter_test.* TO 'microgifter_test'@'%';
          SET GLOBAL log_bin_trust_function_creators = 1;
          FLUSH PRIVILEGES;
          SQL
      - name: Apply foundation through Stage 12D
        run: |
          composer migrate
          php scripts/run_stage3_delivery.php
          php scripts/run_stage4_product_assets.php
          php scripts/run_stage4b_builder.php
          php scripts/run_stage4c_feed_stream.php
          php scripts/stage4d.php
          php scripts/stage4e.php
          php scripts/stage4f.php
          php scripts/stage5a.php
          php scripts/stage5c.php
          php scripts/stage5d.php
          php scripts/stage5e.php
          php scripts/stage5f.php
          php scripts/stage5g.php
          php scripts/stage5h.php
          php scripts/stage5i.php
          php scripts/stage5j.php
          php scripts/stage7b.php
          php scripts/stage8b.php
          php scripts/stage9b.php
          php scripts/stage9c.php
          php scripts/stage9c_smoke.php
          php scripts/stage9d.php
          php scripts/stage9e3_upgrade_manifest.php
          php scripts/stage10f_apply.php
          php scripts/stage11g.php
          php scripts/stage11h.php
          php scripts/stage12.php
          php scripts/stage12a.php
          php scripts/stage12d.php
          php scripts/stage12d_smoke.php
      - name: Validate Stage 12B wallet-tip compatibility
        run: composer test-tip-behavior
      - name: Validate Stage 12C payment compatibility
        run: composer test-tip-payment-behavior
      - name: Validate Stage 12D refund and dispute recovery
        run: |
          mkdir -p build
          set +e
          composer test-tip-recovery-behavior > build/stage12d-tip-recovery.log 2>&1
          status=$?
          cat build/stage12d-tip-recovery.log
          exit "$status"
      - name: Upload Stage 12D recovery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage12d-tip-recovery-diagnostics
          path: build/stage12d-tip-recovery.log
          retention-days: 7
          if-no-files-found: warn
      - name: Validate Stage 12D contracts
        run: vendor/bin/phpunit --configuration phpunit.xml.dist --filter Stage12DTipRecoveryBehaviorTest
