name: Microgift Lifecycle Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/account/action-center-*.php'
      - 'api/messages/**'
      - 'api/microgifts/**'
      - 'api/pppm/**'
      - 'api/communications/**'
      - 'database/**'
      - 'scripts/apply_lifecycle_schema.sh'
      - 'scripts/validate_microgift_behavior.php'
      - 'tests/integration/MicrogiftBehaviorFixture.php'
      - 'tests/phpunit/*Microgift*'
      - 'tests/phpunit/Stage11EActionCenterActionWiringTest.php'
      - 'composer.json'
      - '.github/workflows/microgift-lifecycle-validation.yml'
  push:
    branches: [main]
    paths:
      - 'api/account/action-center-*.php'
      - 'api/messages/**'
      - 'api/microgifts/**'
      - 'api/pppm/**'
      - 'api/communications/**'
      - 'database/**'
      - 'scripts/apply_lifecycle_schema.sh'
      - 'scripts/validate_microgift_behavior.php'
      - 'tests/integration/MicrogiftBehaviorFixture.php'
      - 'tests/phpunit/*Microgift*'
      - 'tests/phpunit/Stage11EActionCenterActionWiringTest.php'
      - 'composer.json'
      - '.github/workflows/microgift-lifecycle-validation.yml'

permissions:
  contents: read

concurrency:
  group: microgift-lifecycle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_BASE_URL: http://127.0.0.1:8080
      MG_DB_HOST: 127.0.0.1
      MG_DB_NAME: microgifter_lifecycle_test
      MG_DB_USER: microgifter_test
      MG_DB_PASS: microgifter_test
      MG_DB_CHARSET: utf8mb4
      MG_SESSION_NAME: mg_lifecycle_session
      MG_CLAIM_CODE_PEPPER: lifecycle-claim-code-pepper
      MG_MEDIA_SIGNING_SECRET: lifecycle-media-secret
      MG_DISTRIBUTION_HASH_SECRET: lifecycle-distribution-secret
      MG_DISTRIBUTION_WEBHOOK_SECRET: lifecycle-distribution-webhook-secret
      MG_MERCHANT_INVITE_SECRET: lifecycle-merchant-secret
      MG_REPORT_EMAIL_SECRET: lifecycle-report-secret
      MG_PAYMENT_PROVIDER: sandbox
      MG_PAYMENT_MODE: test
      MG_PAYMENT_WEBHOOK_SECRET: lifecycle-payment-secret
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl,fileinfo,json,mbstring,pdo,pdo_mysql
          coverage: none
          tools: composer
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Configure lifecycle database
        run: |
          sudo systemctl start mysql.service
          run_mysql_root() {
            if mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql -uroot -proot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if mysql -uroot "$@" 2>/tmp/mysql-root.err; then return 0; fi
            if sudo mysql "$@" 2>/tmp/mysql-root.err; then return 0; fi
            cat /tmp/mysql-root.err || true
            return 1
          }
          run_mysql_root <<'SQL'
          CREATE DATABASE IF NOT EXISTS microgifter_lifecycle_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'microgifter_test'@'localhost' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'127.0.0.1' IDENTIFIED BY 'microgifter_test';
          CREATE USER IF NOT EXISTS 'microgifter_test'@'%' IDENTIFIED BY 'microgifter_test';
          GRANT ALL PRIVILEGES ON microgifter_lifecycle_test.* TO 'microgifter_test'@'localhost';
          GRANT ALL PRIVILEGES ON microgifter_lifecycle_test.* TO 'microgifter_test'@'127.0.0.1';
          GRANT ALL PRIVILEGES ON microgifter_lifecycle_test.* TO 'microgifter_test'@'%';
          SET GLOBAL log_bin_trust_function_creators = 1;
          FLUSH PRIVILEGES;
          SQL
      - name: Apply validated schema stages
        run: bash scripts/apply_lifecycle_schema.sh
      - name: Run complete Microgift lifecycle
        id: lifecycle
        shell: bash
        run: |
          mkdir -p build
          set +e
          composer test-microgift-behavior > build/microgift-lifecycle.log 2>&1
          status=$?
          cat build/microgift-lifecycle.log
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload lifecycle validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: microgift-lifecycle-log
          path: build/microgift-lifecycle.log
          if-no-files-found: warn
          retention-days: 14
