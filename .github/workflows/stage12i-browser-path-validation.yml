name: Stage 12I Browser Path Validation

on:
  pull_request:
    paths:
      - 'images/reward_saved_limited_coffee_for_two.png'
      - 'tests/browser/stage12-discovery-wallet-path.spec.js'
      - 'tests/browser/fixtures/stage12i-discovery-wallet-fixture.json'
      - 'scripts/validate_stage12i_seed_browser_paths.php'
      - 'package.json'
      - '.github/workflows/stage12i-browser-path-validation.yml'
  push:
    branches:
      - 'stage12i-*'
    paths:
      - 'images/reward_saved_limited_coffee_for_two.png'
      - 'tests/browser/stage12-discovery-wallet-path.spec.js'
      - 'tests/browser/fixtures/stage12i-discovery-wallet-fixture.json'
      - 'scripts/validate_stage12i_seed_browser_paths.php'
      - 'package.json'
      - '.github/workflows/stage12i-browser-path-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MG_TEST_BASE_URL: http://127.0.0.1:8080
      MG_APP_ENV: testing
      MG_DEBUG: '0'
      MG_APP_URL: http://127.0.0.1:8080
      MG_BASE_URL: http://127.0.0.1:8080
      MG_RUNTIME_PROFILE: local
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: php -l scripts/validate_stage12i_seed_browser_paths.php
      - run: php scripts/validate_stage12i_seed_browser_paths.php
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Start PHP test server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/microgifter-stage12i-server.log 2>&1 &
          echo $! > /tmp/microgifter-stage12i-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/offers.php >/tmp/microgifter-stage12i-offers.html; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/microgifter-stage12i-server.log
          exit 1
      - run: npm run test:browser:stage12
      - name: Show PHP server log on failure
        if: failure()
        run: cat /tmp/microgifter-stage12i-server.log || true
      - name: Stop PHP test server
        if: always()
        run: if [ -f /tmp/microgifter-stage12i-server.pid ]; then kill "$(cat /tmp/microgifter-stage12i-server.pid)" || true; fi
