name: Stage 12 Campaigns Validation

on:
  pull_request:
    paths:
      - 'database/stage_12_campaigns_reward_templates.sql'
      - 'database/stage_12b_campaign_events_agent_context.sql'
      - 'campaign.php'
      - 'wallet.php'
      - 'merchant-campaigns.php'
      - 'merchant-reward-templates.php'
      - 'includes/merchant-campaigns-view.php'
      - 'includes/merchant-reward-templates-view.php'
      - 'api/account/wallet-*.php'
      - 'api/merchant/*.php'
      - 'api/public/campaigns/*.php'
      - 'api/public/offers/*.php'
      - 'api/public/wallet/*.php'
      - 'assets/js/stage12-*.js'
      - 'assets/js/public-campaign.js'
      - 'scripts/validate_stage12*.php'
      - '.github/workflows/stage12-campaigns-validation.yml'
  push:
    branches:
      - main
      - 'stage12-*'
      - 'stage12b-*'
      - 'stage12c-*'
    paths:
      - 'database/stage_12_campaigns_reward_templates.sql'
      - 'database/stage_12b_campaign_events_agent_context.sql'
      - 'campaign.php'
      - 'wallet.php'
      - 'merchant-campaigns.php'
      - 'merchant-reward-templates.php'
      - 'includes/merchant-campaigns-view.php'
      - 'includes/merchant-reward-templates-view.php'
      - 'api/account/wallet-*.php'
      - 'api/merchant/*.php'
      - 'api/public/campaigns/*.php'
      - 'api/public/offers/*.php'
      - 'api/public/wallet/*.php'
      - 'assets/js/stage12-*.js'
      - 'assets/js/public-campaign.js'
      - 'scripts/validate_stage12*.php'
      - '.github/workflows/stage12-campaigns-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage12-campaigns-validation:
    name: Stage 12 campaigns validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: PHP syntax check
        shell: bash
        run: |
          set -euo pipefail
          php -l campaign.php
          php -l wallet.php
          php -l merchant-campaigns.php
          php -l merchant-reward-templates.php
          php -l includes/merchant-campaigns-view.php
          php -l includes/merchant-reward-templates-view.php
          php -l api/account/wallet-items.php
          php -l api/account/wallet-claim.php
          php -l api/merchant/reward-templates.php
          php -l api/merchant/campaigns.php
          php -l api/merchant/campaign-activity.php
          php -l api/merchant/campaign-contacts.php
          php -l api/merchant/campaign-public-tools.php
          php -l api/merchant/campaign-winner.php
          php -l api/merchant/wallet-redeem.php
          php -l api/public/campaigns/detail.php
          php -l api/public/campaigns/signup.php
          php -l api/public/campaigns/qr-pickup.php
          php -l api/public/campaigns/contest-entry.php
          php -l api/public/offers/search.php
          php -l api/public/wallet/add.php
          php -l scripts/validate_stage12_campaigns_reward_templates.php
          php -l scripts/validate_stage12b_runtime_fixes.php
          php -l scripts/validate_stage12c_wallet_campaign_pages.php

      - name: Validate Stage 12 campaigns foundation
        shell: bash
        run: |
          set -euo pipefail
          php scripts/validate_stage12_campaigns_reward_templates.php
          php scripts/validate_stage12b_runtime_fixes.php
          php scripts/validate_stage12c_wallet_campaign_pages.php
