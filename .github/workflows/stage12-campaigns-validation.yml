name: Stage 12 Campaigns Validation

on:
  pull_request:
    paths:
      - 'database/stage_12_campaigns_reward_templates.sql'
      - 'docs/stage-12-campaigns-reward-templates-build-plan.md'
      - 'merchant-campaigns.php'
      - 'merchant-reward-templates.php'
      - 'includes/merchant-campaigns-view.php'
      - 'includes/merchant-reward-templates-view.php'
      - 'includes/merchant-workspace.php'
      - 'includes/merchant-view.php'
      - 'includes/header-components/app-header.php'
      - 'api/merchant/reward-templates.php'
      - 'api/merchant/campaigns.php'
      - 'scripts/validate_stage12_campaigns_reward_templates.php'
      - '.github/workflows/stage12-campaigns-validation.yml'
  push:
    branches:
      - main
      - 'stage12-*'
      - 'stage12b-*'
    paths:
      - 'database/stage_12_campaigns_reward_templates.sql'
      - 'docs/stage-12-campaigns-reward-templates-build-plan.md'
      - 'merchant-campaigns.php'
      - 'merchant-reward-templates.php'
      - 'includes/merchant-campaigns-view.php'
      - 'includes/merchant-reward-templates-view.php'
      - 'includes/merchant-workspace.php'
      - 'includes/merchant-view.php'
      - 'includes/header-components/app-header.php'
      - 'api/merchant/reward-templates.php'
      - 'api/merchant/campaigns.php'
      - 'scripts/validate_stage12_campaigns_reward_templates.php'
      - '.github/workflows/stage12-campaigns-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage12-campaigns-validation:
    name: Stage 12 campaigns validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: PHP syntax check
        shell: bash
        run: |
          set -euo pipefail
          php -l merchant-campaigns.php
          php -l merchant-reward-templates.php
          php -l includes/merchant-campaigns-view.php
          php -l includes/merchant-reward-templates-view.php
          php -l includes/merchant-workspace.php
          php -l includes/merchant-view.php
          php -l includes/header-components/app-header.php
          php -l api/merchant/reward-templates.php
          php -l api/merchant/campaigns.php
          php -l scripts/validate_stage12_campaigns_reward_templates.php

      - name: Validate Stage 12 campaigns foundation
        shell: bash
        run: |
          set -euo pipefail
          php scripts/validate_stage12_campaigns_reward_templates.php
