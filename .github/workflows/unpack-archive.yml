name: Unpack repository archive

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unpack tracked ZIP archives
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t archives < <(git ls-files '*.zip' '*.ZIP')

          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No tracked ZIP archives found."
            exit 0
          fi

          printf 'Archives found:\n'
          printf ' - %s\n' "${archives[@]}"

          for archive in "${archives[@]}"; do
            echo "Unpacking $archive into the repository root"
            unzip -q -o "$archive" -d .
            rm -f "$archive"
          done

      - name: Commit extracted files
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No repository changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unpack repository archive"
          git push
