name: Move extracted project to root

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/unzip.yml'

permissions:
  contents: write

concurrency:
  group: unzip-main
  cancel-in-progress: false

jobs:
  move-to-root:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Move extracted files to repository root
        run: |
          set -e

          SOURCE_DIR="microgifter-main"

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "The extracted folder does not exist."
            exit 1
          fi

          # Handle archives that contain one additional wrapper folder.
          shopt -s dotglob nullglob
          entries=("$SOURCE_DIR"/*)
          if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
            SOURCE_DIR="${entries[0]}"
          fi

          # Move the project to the repository root, but do not import
          # workflow files because the GitHub Actions token cannot modify them.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            "$SOURCE_DIR"/ ./

          rm -rf microgifter-main

      - name: Commit and push moved files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No files needed to be moved."
            exit 0
          fi

          git commit -m "Move Microgifter project files to repository root"
          git pull --rebase origin main
          git push origin HEAD:main
