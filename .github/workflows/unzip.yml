name: Unzip project

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/unzip.yml'

permissions:
  contents: write

concurrency:
  group: unzip-main
  cancel-in-progress: false

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract ZIP
        run: |
          rm -rf microgifter-main
          mkdir -p microgifter-main
          unzip -o "microgifter-main (74).zip" -d microgifter-main

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add microgifter-main

          if git diff --cached --quiet; then
            echo "No new files to commit."
            exit 0
          fi

          git commit -m "Extract Microgifter project files"
          git pull --rebase origin main
          git push origin HEAD:main
