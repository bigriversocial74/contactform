name: Commerce Operations Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/commerce/**'
      - 'api/payments/**'
      - 'api/public/product.php'
      - 'assets/js/cart.js'
      - 'assets/js/checkout.js'
      - 'assets/js/customer-commerce*.js'
      - 'cart.php'
      - 'checkout.php'
      - 'checkout-success.php'
      - 'product.php'
      - 'database/stage_3_commerce_microgift_fulfillment.sql'
      - 'database/stage_5i_payments_checkout_reconciliation.sql'
      - 'database/stage_v1c_checkout_session_intent_authority.sql'
      - 'database/stage_v1f_stripe_payments.sql'
      - 'tests/phpunit/*Cart*Test.php'
      - 'tests/phpunit/*Checkout*Test.php'
      - 'tests/phpunit/*Commerce*Test.php'
      - 'tests/phpunit/*Payment*Test.php'
      - '.github/workflows/commerce-operations-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation-scope:
    runs-on: ubuntu-latest
    outputs:
      heavy_validation_required: ${{ steps.scope.outputs.heavy_validation_required }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine validation scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "heavy_validation_required=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch --no-tags --prune --depth=1 origin "${BASE_SHA}"

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}")"
          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "heavy_validation_required=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          HEAVY_VALIDATION_REQUIRED=false
          while IFS= read -r FILE; do
            case "${FILE}" in
              .github/workflows/*.yml)
                ;;
              *)
                HEAVY_VALIDATION_REQUIRED=true
                break
                ;;
            esac
          done <<< "${CHANGED_FILES}"

          echo "Changed files:"
          printf '%s\n' "${CHANGED_FILES}"
          echo "heavy_validation_required=${HEAVY_VALIDATION_REQUIRED}" >> "${GITHUB_OUTPUT}"

  validate:
    needs: validation-scope
    if: needs.validation-scope.outputs.heavy_validation_required == 'true'
    uses: ./.github/workflows/recovery-baseline.yml
